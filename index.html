<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Dicee</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1 id="result">Roll the Dice!</h1>

      <div class="dice-area">
        <div class="dice">
          <p>Player 1</p>
          <img class="img1" src="./images/dice6.png" alt="Player 1 dice" />
          <p class="score-label">Score: <span id="score1">0</span></p>
        </div>

        <div class="vs-label">VS</div>

        <div class="dice">
          <p>Player 2</p>
          <img class="img2" src="./images/dice6.png" alt="Player 2 dice" />
          <p class="score-label">Score: <span id="score2">0</span></p>
        </div>
      </div>

      <button id="rollBtn" onclick="rollDice()">🎲 Roll Dice</button>
      <button id="resetBtn" onclick="resetScores()">↺ Reset Scores</button>
    </div>

    <footer>www 🎲 App Brewery 🎲 com</footer>
    <script src="index.js"></script>
  </body>
</html>
